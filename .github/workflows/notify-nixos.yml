name: Notify NixOS Flake Input

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  notify:
    name: notify
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch NixOS update
        env:
          NIXOS_REPO_PAT: ${{ secrets.NIXOS_REPO_PAT }}
          NIXOS_REPO: wyatt-avilla/nixos
          WORKFLOW_FILE: update-wyattwtf-input.yml
        run: |
          if [ -z "${NIXOS_REPO_PAT:-}" ]; then
            echo "NIXOS_REPO_PAT is required to dispatch the NixOS update workflow."
            exit 1
          fi

          curl -fL --retry 3 \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${NIXOS_REPO_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${NIXOS_REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches" \
            -d '{"ref":"main"}'
